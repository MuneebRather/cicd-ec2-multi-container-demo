name: Build and Deploy Multiple Containers

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - '.dockerignore'
      - '.screenshots/**'
      - '.README.md'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      node: ${{ steps.filter.outputs.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'python-app/**'
            node:
              - 'node-app/**'

  deploy:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: needs.changes.outputs.python == 'true' || needs.changes.outputs.node == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push python image
        if: needs.changes.outputs.python == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./python-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-app:latest

      - name: Build and Push node image
        if: needs.changes.outputs.node == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./node-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest

      - name: Deploy python files to EC2
        if: needs.changes.outputs.python == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ${{ secrets.EC2_USER}}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/python-app:latest
              docker stop ec2-py-demo || true
              docker rm ec2-py-demo || true
              docker run -d --name ec2-py-demo -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/python-app:latest

      - name: Deploy node files to EC2
        if: needs.changes.outputs.node == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ${{ secrets.EC2_USER}}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              docker pull ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest
              docker stop ec2-nd-demo || true
              docker rm ec2-nd-demo || true
              docker run -d --name ec2-nd-demo -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest